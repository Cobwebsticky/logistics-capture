<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Logistics Capture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="bg-gray-50">
    <nav class="gradient-bg shadow-lg">
        <div class="container mx-auto px-6 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <i class="ri-settings-5-line text-2xl text-white"></i>
                    <span class="text-xl font-bold text-white">Admin Panel</span>
                </div>
                <a href="/" class="bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-lg transition-all flex items-center space-x-2">
                    <i class="ri-home-line"></i>
                    <span>Back to Upload</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-6 py-12">
        <div class="max-w-lg mx-auto">
            <div class="bg-white rounded-2xl shadow-xl p-8">
                <div class="text-center mb-6">
                    <i class="ri-exchange-line text-5xl text-purple-600"></i>
                    <h2 class="text-2xl font-bold text-gray-800 mt-2">Update Shipment Status</h2>
                    <p class="text-gray-600">Change the status of any shipment</p>
                </div>
                
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-2">Shipment ID</label>
                    <input type="text" id="shipmentId" placeholder="e.g., 3a6a2aaa" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500">
                </div>
                
                <div class="mb-6">
                    <label class="block text-gray-700 font-semibold mb-2">New Status</label>
                    <select id="status" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500">
                        <option value="pending">📦 Pending</option>
                        <option value="in transit">🚚 In Transit</option>
                        <option value="delivered">✅ Delivered</option>
                    </select>
                </div>
                
                <button id="updateBtn" class="w-full gradient-bg text-white font-semibold py-3 rounded-lg transition-all hover:opacity-90 flex items-center justify-center space-x-2">
                    <i class="ri-refresh-line"></i>
                    <span>Update Status</span>
                </button>
                
                <div id="result" class="mt-6"></div>
            </div>
        </div>
    </div>

    <script>
        const updateBtn = document.getElementById('updateBtn');
        const shipmentId = document.getElementById('shipmentId');
        const status = document.getElementById('status');
        const result = document.getElementById('result');
        
        updateBtn.addEventListener('click', async () => {
            const id = shipmentId.value.trim();
            const newStatus = status.value;
            
            if (!id) {
                result.innerHTML = '<div class="bg-red-100 text-red-700 p-4 rounded-lg">❌ Please enter a Shipment ID</div>';
                return;
            }
            
            result.innerHTML = '<div class="bg-blue-100 text-blue-700 p-4 rounded-lg flex items-center space-x-2"><i class="ri-loader-4-line animate-spin"></i><span>Updating...</span></div>';
            
            try {
                const response = await fetch(`https://logistics-capture.onrender.com/update/${id}/${newStatus}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    let statusIcon = newStatus === 'delivered' ? '✅' : (newStatus === 'in transit' ? '🚚' : '📦');
                    result.innerHTML = `<div class="bg-green-100 text-green-700 p-4 rounded-lg">
                        <strong>${statusIcon} Success!</strong> Shipment ${data.shipment_id} status updated to ${data.new_status}<br><br>
                        <a href="https://logistics-capture.onrender.com/track/${id}" target="_blank" class="text-purple-600 hover:underline">View Tracking Page →</a>
                    </div>`;
                    shipmentId.value = '';
                } else {
                    result.innerHTML = `<div class="bg-red-100 text-red-700 p-4 rounded-lg">❌ Error: ${data.error}</div>`;
                }
            } catch (error) {
                result.innerHTML = `<div class="bg-red-100 text-red-700 p-4 rounded-lg">❌ Connection error: ${error.message}</div>`;
            }
        });
    </script>
</body>
</html>
