<!DOCTYPE html>
<html>
<head>
    <title>Admin - Update Shipment Status</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; padding: 20px; }
        .container { background: #f9f9f9; padding: 30px; border-radius: 10px; }
        input, select, button { padding: 10px; margin: 10px 0; font-size: 16px; width: 100%; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin-top: 20px; padding: 15px; background: #e9ecef; border-radius: 5px; }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
        h1 { color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Admin: Update Shipment Status</h1>
        
        <label>Shipment ID:</label>
        <input type="text" id="shipmentId" placeholder="e.g., 89af6784">
        
        <label>New Status:</label>
        <select id="status">
            <option value="pending">Pending</option>
            <option value="in transit">In Transit</option>
            <option value="delivered">Delivered</option>
        </select>
        
        <button id="updateBtn">Update Status</button>
        
        <div id="result" class="result"></div>
    </div>

    <script>
        const updateBtn = document.getElementById('updateBtn');
        const shipmentId = document.getElementById('shipmentId');
        const status = document.getElementById('status');
        const result = document.getElementById('result');
        
        updateBtn.addEventListener('click', async () => {
            const id = shipmentId.value.trim();
            const newStatus = status.value;
            
            if (!id) {
                result.innerHTML = '<span class="error">❌ Please enter a Shipment ID</span>';
                return;
            }
            
            result.innerHTML = '⏳ Updating...';
            
            try {
                const response = await fetch(`https://feeble-earmark-preshow.ngrok-free.dev/update/${id}/${newStatus}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    result.innerHTML = `<span class="success">✅ Success! Shipment ${data.shipment_id} status updated to ${data.new_status}</span><br><br>
                                       <a href="https://feeble-earmark-preshow.ngrok-free.dev/track/${id}" target="_blank">View Tracking Page →</a>`;
                } else {
                    result.innerHTML = `<span class="error">❌ Error: ${data.error}</span>`;
                }
            } catch (error) {
                result.innerHTML = `<span class="error">❌ Connection error: ${error.message}</span>`;
            }
        });
    </script>
</body>
</html>
